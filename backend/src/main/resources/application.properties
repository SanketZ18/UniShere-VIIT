spring.application.name=UniShare - Smart Academic Content Portal
server.port=${PORT:8080}

spring.config.import=optional:file:.env[.properties]

spring.data.mongodb.uri=${MONGODB_URI:mongodb://localhost:27017/unishare}
spring.servlet.multipart.max-file-size=20MB
spring.servlet.multipart.max-request-size=25MB

app.jwt.secret=${JWT_SECRET:please_set_jwt_secret_in_env_file_for_production}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}
app.cors.allowed-origins=${CORS_ALLOWED_ORIGINS:http://localhost:5173}
app.file.upload-dir=${FILE_UPLOAD_DIR:uploads}
app.bootstrap.admin.email=${BOOTSTRAP_ADMIN_EMAIL:}
app.bootstrap.admin.password=${BOOTSTRAP_ADMIN_PASSWORD:}
app.bootstrap.admin.name=${BOOTSTRAP_ADMIN_NAME:UniShare - Smart Academic Content Portal Admin}
app.bootstrap.external-resources.enabled=${EXTERNAL_RESOURCES_ENABLED:true}
app.external-content.sync-interval-ms=${EXTERNAL_CONTENT_SYNC_INTERVAL_MS:1800000}
app.external-content.sync-initial-delay-ms=${EXTERNAL_CONTENT_SYNC_INITIAL_DELAY_MS:300000}
app.demo-data.enabled=${DEMO_DATA_ENABLED:true}

management.endpoints.web.exposure.include=health,info
management.endpoint.health.show-details=when_authorized

logging.level.root=INFO
logging.level.org.springframework=INFO
logging.level.org.springframework.boot=INFO
logging.level.org.mongodb=INFO
logging.level.org.apache=INFO
logging.level.com.unishare=DEBUG
spring.main.banner-mode=console
spring.main.log-startup-info=true
